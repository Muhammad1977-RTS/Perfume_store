<article class="product-card">
  <button type="button" class="media" [attr.aria-label]="'Посмотреть фото: ' + product.name" (click)="openLightbox()">
    <img [src]="product.imageUrl" [alt]="product.name" loading="lazy" />
  </button>
  <div class="product-body">
    <div class="product-meta">
      <span class="brand">{{ product.brand }}</span>
      <span class="price">€{{ product.price }}</span>
    </div>
    <h3>{{ product.name }}</h3>
    <p>{{ product.description }}</p>
    <button type="button" class="button" (click)="handleAdd()" [disabled]="added()">
      {{ added() ? 'Добавлено ✓' : 'Добавить в корзину' }}
    </button>
  </div>
</article>

@if (lightboxOpen) {
  <div class="lightbox" role="dialog" [attr.aria-label]="'Фото: ' + product.name" (click)="closeLightbox()">
    <button type="button" class="lightbox-close" aria-label="Закрыть" (click)="closeLightbox()">✕</button>
    <img [src]="product.imageUrl" [alt]="product.name" />
  </div>
}
