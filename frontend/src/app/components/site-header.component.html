<header class="site-header">
  <div class="brand">
    <a routerLink="/">PERFUME STUDIO</a>
    <span class="pill">luxury menswear fragrance</span>
  </div>
  <nav class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Каталог</a>
    <a routerLink="/cart" routerLinkActive="active">Корзина</a>
    <a routerLink="/checkout" routerLinkActive="active">Оформить заказ</a>
    @if (authService.isAdmin()) {
      <a routerLink="/admin" routerLinkActive="active">Панель управления</a>
    }
  </nav>
  <div class="actions">
    <button class="btn-theme" (click)="themeService.toggle()" [title]="themeService.isDark() ? 'Светлая тема' : 'Тёмная тема'" aria-label="Переключить тему">
      @if (themeService.isDark()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
          <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    @if (authService.isLoggedIn()) {
      <div class="user-menu">
        <a routerLink="/orders" class="btn-orders">Мои заказы</a>
        <span class="user-name">{{ authService.user()?.name || authService.user()?.email }}</span>
        <button class="btn-logout" (click)="logout()">Выйти</button>
      </div>
    } @else {
      <a routerLink="/login" class="btn-login">Войти</a>
    }
    <a routerLink="/cart" class="cart-link" [attr.aria-label]="'Корзина, ' + cartService.totalQuantity() + ' товаров'">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <strong aria-hidden="true">{{ cartService.totalQuantity() }}</strong>
    </a>
  </div>
</header>
